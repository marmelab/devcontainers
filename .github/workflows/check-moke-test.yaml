name: "Test Templates"
on:
  pull_request:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      # JSON array of matching filter keys, e.g. ["node"]. Consumed by the test matrix.
      templates: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v5

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            node:
              - ./**/node/**
              # Shared infra: a change here must re-run every template's smoke test.
              - .github/actions/smoke-test/**
              - test/test-utils/**
              - package.json
              - package-lock.json
              - .nvmrc

  test:
    needs: [detect-changes]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        templates: ${{ fromJSON(needs.detect-changes.outputs.templates) }}
    steps:
      - uses: actions/checkout@v5

      - name: Smoke test for '${{ matrix.templates }}'
        id: smoke_test
        uses: ./.github/actions/smoke-test
        with:
          template: "${{ matrix.templates }}"
