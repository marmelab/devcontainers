name: "Test Templates"
on:
  pull_request:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      templates: ${{ steps.set-templates.outputs.templates }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            node:
              - ./**/node/**
              # Shared infra: a change here must re-run every template's smoke test.
              - .github/actions/smoke-test/**
              - test/test-utils/**
              - package.json
              - package-lock.json
              - .nvmrc

      - name: Determine templates to test
        id: set-templates
        shell: bash
        run: |
          # Only test templates affected by the PR's changes.
          echo "templates=${{ steps.filter.outputs.changes }}" >> "$GITHUB_OUTPUT"

  test:
    needs: [detect-changes]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        templates: ${{ fromJSON(needs.detect-changes.outputs.templates) }}
    steps:
      - uses: actions/checkout@v4

      - name: Smoke test for '${{ matrix.templates }}'
        id: smoke_test
        uses: ./.github/actions/smoke-test
        with:
          template: "${{ matrix.templates }}"
