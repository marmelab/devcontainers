name: "CI - Test Templates"
on:
  pull_request:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      templates: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            node:
              - ./**/node/**
              # Shared infra: a change here must re-run every template's smoke test.
              - .github/actions/smoke-test/**
              - test/test-utils/**
              - package.json
              - package-lock.json
              - .nvmrc

  test:
    needs: [detect-changes]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        templates: ${{ fromJSON(needs.detect-changes.outputs.templates) }}
    steps:
      - uses: actions/checkout@v4

      - name: Smoke test for '${{ matrix.templates }}'
        id: smoke_test
        uses: ./.github/actions/smoke-test
        with:
          template: "${{ matrix.templates }}"
