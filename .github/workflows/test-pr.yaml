name: "CI - Test Templates"
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      templates: ${{ steps.set-templates.outputs.templates }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            node:
              - ./**/node/**
              # Shared infra: a change here must re-run every template's smoke test.
              - .github/actions/smoke-test/**
              - test/test-utils/**
              - package.json
              - package-lock.json
              - .nvmrc

      - name: Determine templates to test
        id: set-templates
        shell: bash
        run: |
          # On push to main, test every template. On PRs, only those affected by the changes.
          if [ "${{ github.event_name }}" = "push" ]; then
            templates=$(ls -1 src | jq -R . | jq -s -c .)
          else
            templates='${{ steps.filter.outputs.changes }}'
          fi
          echo "templates=$templates" >> "$GITHUB_OUTPUT"

  test:
    needs: [detect-changes]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        templates: ${{ fromJSON(needs.detect-changes.outputs.templates) }}
    steps:
      - uses: actions/checkout@v4

      - name: Smoke test for '${{ matrix.templates }}'
        id: smoke_test
        uses: ./.github/actions/smoke-test
        with:
          template: "${{ matrix.templates }}"
